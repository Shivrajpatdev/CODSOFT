<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic-Tac-Toe AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --panel: #12121a;
      --border: #1e1e2e;
      --x-color: #00f5ff;
      --o-color: #ff2d78;
      --win-glow: #ffe600;
      --text: #e0e0f0;
      --muted: #555570;
      --cell-bg: #0d0d18;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0,245,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255,45,120,0.04) 0%, transparent 60%);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      letter-spacing: 0.15em;
      text-align: center;
      margin-bottom: 6px;
      background: linear-gradient(90deg, var(--x-color), var(--o-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-align: center;
      margin-bottom: 28px;
      text-transform: uppercase;
    }

    .score-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      justify-content: center;
    }

    .score-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 22px;
      text-align: center;
      min-width: 90px;
      position: relative;
      overflow: hidden;
    }

    .score-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .score-box.x-box::before { background: var(--x-color); }
    .score-box.o-box::before { background: var(--o-color); }
    .score-box.tie-box::before { background: var(--win-glow); }

    .score-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .score-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
    }

    .x-box .score-num { color: var(--x-color); }
    .o-box .score-num { color: var(--o-color); }
    .tie-box .score-num { color: var(--win-glow); }

    .status {
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-align: center;
      margin-bottom: 20px;
      min-height: 24px;
      color: var(--text);
      transition: color 0.3s;
    }

    .status .x-text { color: var(--x-color); font-weight: bold; }
    .status .o-text { color: var(--o-color); font-weight: bold; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 28px;
      position: relative;
    }

    .cell {
      width: clamp(90px, 22vw, 130px);
      height: clamp(90px, 22vw, 130px);
      background: var(--cell-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 900;
      transition: background 0.15s, transform 0.1s, border-color 0.3s;
      position: relative;
      overflow: hidden;
      user-select: none;
    }

    .cell:hover:not(.taken):not(.disabled) {
      background: #161625;
      border-color: #333355;
      transform: scale(1.04);
    }

    .cell:active:not(.taken):not(.disabled) {
      transform: scale(0.97);
    }

    .cell.taken { cursor: default; }
    .cell.disabled { cursor: not-allowed; }

    .cell.x-cell {
      color: var(--x-color);
      border-color: rgba(0,245,255,0.25);
      text-shadow: 0 0 18px var(--x-color);
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    .cell.o-cell {
      color: var(--o-color);
      border-color: rgba(255,45,120,0.25);
      text-shadow: 0 0 18px var(--o-color);
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    .cell.win-cell {
      background: rgba(255,230,0,0.07);
      border-color: var(--win-glow) !important;
      box-shadow: 0 0 18px rgba(255,230,0,0.3);
      animation: winPulse 0.8s ease infinite alternate;
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    @keyframes winPulse {
      from { box-shadow: 0 0 10px rgba(255,230,0,0.2); }
      to   { box-shadow: 0 0 30px rgba(255,230,0,0.6); }
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 420px;
    }

    .mode-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .mode-btn, .reset-btn {
      flex: 1;
      padding: 11px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .mode-btn:hover, .reset-btn:hover {
      border-color: #333355;
      color: var(--text);
    }

    .mode-btn.active {
      background: rgba(0,245,255,0.08);
      border-color: var(--x-color);
      color: var(--x-color);
    }

    .reset-btn {
      background: rgba(255,45,120,0.07);
      border-color: rgba(255,45,120,0.3);
      color: var(--o-color);
      letter-spacing: 0.18em;
      font-weight: bold;
    }

    .reset-btn:hover {
      background: rgba(255,45,120,0.15);
      border-color: var(--o-color);
    }

    .info {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-align: center;
      margin-top: 6px;
    }

    .thinking {
      display: inline-block;
      animation: blink 0.7s step-start infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

<h1>TIC-TAC-TOE</h1>
<p class="subtitle">AI powered by minimax algorithm</p>

<div class="score-bar">
  <div class="score-box x-box">
    <div class="score-label">YOU (X)</div>
    <div class="score-num" id="score-x">0</div>
  </div>
  <div class="score-box tie-box">
    <div class="score-label">DRAWS</div>
    <div class="score-num" id="score-t">0</div>
  </div>
  <div class="score-box o-box">
    <div class="score-label">AI (O)</div>
    <div class="score-num" id="score-o">0</div>
  </div>
</div>

<div class="status" id="status"><span class="x-text">YOUR TURN</span> — PLACE X</div>

<div class="board" id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<div class="controls">
  <div class="mode-row">
    <button class="mode-btn active" id="btn-hard">UNBEATABLE AI</button>
    <button class="mode-btn" id="btn-easy">EASY AI</button>
  </div>
  <button class="reset-btn" id="reset-btn">NEW GAME</button>
</div>

<p class="info">Minimax algorithm · Alpha-Beta Pruning · Always optimal</p>

<script>
  let board = Array(9).fill(null);
  let gameOver = false;
  let difficulty = 'hard';
  let scores = { X: 0, O: 0, T: 0 };

  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  const cells    = document.querySelectorAll('.cell');
  const statusEl = document.getElementById('status');
  const scoreX   = document.getElementById('score-x');
  const scoreO   = document.getElementById('score-o');
  const scoreT   = document.getElementById('score-t');
  const btnHard  = document.getElementById('btn-hard');
  const btnEasy  = document.getElementById('btn-easy');
  const resetBtn = document.getElementById('reset-btn');

  function checkWinner(b) {
    for (const [a,c,d] of WINS) {
      if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], line: [a,c,d] };
    }
    if (b.every(Boolean)) return { winner: 'draw', line: [] };
    return null;
  }

  function minimax(b, isMax, alpha, beta) {
    const res = checkWinner(b);
    if (res) {
      if (res.winner === 'O') return  10;
      if (res.winner === 'X') return -10;
      return 0;
    }
    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = 'O';
          best = Math.max(best, minimax(b, false, alpha, beta));
          b[i] = null;
          alpha = Math.max(alpha, best);
          if (beta <= alpha) break;
        }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = 'X';
          best = Math.min(best, minimax(b, true, alpha, beta));
          b[i] = null;
          beta = Math.min(beta, best);
          if (beta <= alpha) break;
        }
      }
      return best;
    }
  }

  function bestMove() {
    if (difficulty === 'easy' && Math.random() < 0.6) {
      const empty = board.map((v,i) => v ? null : i).filter(v => v !== null);
      return empty[Math.floor(Math.random() * empty.length)];
    }
    let best = -Infinity, move = -1;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        const score = minimax(board, false, -Infinity, Infinity);
        board[i] = null;
        if (score > best) { best = score; move = i; }
      }
    }
    return move;
  }

  function render() {
    cells.forEach((cell, i) => {
      cell.textContent = board[i] || '';
      cell.className = 'cell';
      if (board[i] === 'X') cell.classList.add('x-cell', 'taken');
      if (board[i] === 'O') cell.classList.add('o-cell', 'taken');
      if (gameOver) cell.classList.add('disabled');
    });
  }

  function highlight(line) {
    line.forEach(i => cells[i].classList.add('win-cell'));
  }

  function setStatus(msg) { statusEl.innerHTML = msg; }

  function aiTurn() {
    if (gameOver) return;
    setStatus(`<span class="o-text">AI THINKING</span> <span class="thinking">...</span>`);
    cells.forEach(c => c.classList.add('disabled'));
    setTimeout(() => {
      const move = bestMove();
      if (move === -1) return;
      board[move] = 'O';
      render();
      const res = checkWinner(board);
      if (res) { endGame(res); return; }
      setStatus(`<span class="x-text">YOUR TURN</span> — PLACE X`);
      cells.forEach(c => { if (!c.classList.contains('taken')) c.classList.remove('disabled'); });
    }, 350);
  }

  function endGame(res) {
    gameOver = true;
    if (res.winner === 'X') {
      scores.X++; scoreX.textContent = scores.X;
      highlight(res.line);
      setStatus(`YOU WIN! <span class="x-text">Impressive!</span>`);
    } else if (res.winner === 'O') {
      scores.O++; scoreO.textContent = scores.O;
      highlight(res.line);
      setStatus(`<span class="o-text">AI WINS!</span> Better luck next time.`);
    } else {
      scores.T++; scoreT.textContent = scores.T;
      setStatus(`IT'S A DRAW! Well played.`);
    }
    render();
  }

  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      const i = parseInt(cell.dataset.i);
      if (board[i] || gameOver) return;
      board[i] = 'X';
      render();
      const res = checkWinner(board);
      if (res) { endGame(res); return; }
      aiTurn();
    });
  });

  resetBtn.addEventListener('click', () => {
    board = Array(9).fill(null);
    gameOver = false;
    render();
    setStatus(`<span class="x-text">YOUR TURN</span> — PLACE X`);
    cells.forEach(c => c.classList.remove('disabled'));
  });

  btnHard.addEventListener('click', () => {
    difficulty = 'hard';
    btnHard.classList.add('active');
    btnEasy.classList.remove('active');
    resetBtn.click();
  });

  btnEasy.addEventListener('click', () => {
    difficulty = 'easy';
    btnEasy.classList.add('active');
    btnHard.classList.remove('active');
    resetBtn.click();
  });
</script>
</body>
  </html>
